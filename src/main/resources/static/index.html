<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Forensics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black min-h-screen flex items-center justify-center p-4 font-sans text-gray-100">

    <div class="max-w-lg w-full bg-gray-800/50 backdrop-blur-lg border border-gray-700 rounded-3xl shadow-2xl overflow-hidden">
        <div class="bg-gray-900/50 p-6 border-b border-gray-700 text-center">
            <h1 class="text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                AI Image Forensics
            </h1>
            <p class="text-gray-400 text-sm mt-2">Powered by Gemini 2.5 Multimodal Analysis</p>
        </div>

        <div class="p-8 space-y-6">
            <div class="border-2 border-dashed border-gray-600 rounded-xl p-6 text-center hover:border-blue-400 transition-colors bg-gray-900/30">
                <input type="file" id="imageInput" accept="image/*" class="hidden" onchange="previewImage(event)">
                <label for="imageInput" class="cursor-pointer flex flex-col items-center justify-center space-y-3">
                    <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    <span class="text-gray-300 font-medium" id="fileName">Click to Upload Image</span>
                </label>
            </div>

            <div id="previewContainer" class="hidden rounded-xl overflow-hidden border border-gray-700 shadow-inner bg-black flex justify-center max-h-48">
                <img id="imagePreview" class="object-contain max-h-48" src="" alt="Preview">
            </div>

            <button id="analyzeBtn" onclick="analyzeImage()" class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition-all transform hover:scale-[1.02] disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center">
                <span id="btnText">Run Forensics Analysis</span>
                <svg id="loadingSpinner" class="hidden animate-spin ml-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>

            <div id="resultCard" class="hidden bg-gray-900/80 rounded-xl p-6 border border-gray-700 text-center shadow-inner mt-4">
                <h2 id="finalVerdict" class="text-3xl font-black mb-2 tracking-wide"></h2>
                <div class="w-full bg-gray-700 rounded-full h-2.5 mb-4 overflow-hidden">
                    <div id="confidenceBar" class="bg-blue-500 h-2.5 rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div>
                </div>
                <p id="reasonText" class="text-gray-300 text-sm italic leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
